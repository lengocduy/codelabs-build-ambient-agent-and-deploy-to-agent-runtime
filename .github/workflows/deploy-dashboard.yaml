name: Deploy Manager Dashboard

on:
  push:
    branches:
      - main
    paths:
      - 'submission_frontend/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      agent_runtime_id:
        description: 'Optional: Specific Agent Runtime ID (Reasoning Engine ID) to connect the dashboard to'
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set environment variables
        id: set-env
        run: |
          # Determine target environment: default to staging for automatic pushes
          ENV="staging"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          fi
          echo "target_env=${ENV}" >> $GITHUB_OUTPUT
          
          # Set project specific variables based on the target environment
          if [ "${ENV}" = "production" ]; then
            echo "project_id=${{ vars.PROD_PROJECT_ID }}" >> $GITHUB_OUTPUT
            echo "logs_bucket=${{ vars.LOGS_BUCKET_NAME_PROD }}" >> $GITHUB_OUTPUT
            # Use user-supplied input runtime ID if available, otherwise default to a placeholder
            INPUT_ID="${{ github.event.inputs.agent_runtime_id }}"
            if [ -n "${INPUT_ID}" ]; then
              echo "agent_runtime_id=${INPUT_ID}" >> $GITHUB_OUTPUT
            else
              echo "agent_runtime_id=projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/${{ vars.REGION }}/reasoningEngines/YOUR_PROD_REASONING_ENGINE_ID" >> $GITHUB_OUTPUT
            fi
          else
            echo "project_id=${{ vars.STAGING_PROJECT_ID }}" >> $GITHUB_OUTPUT
            echo "logs_bucket=${{ vars.LOGS_BUCKET_NAME_STAGING }}" >> $GITHUB_OUTPUT
            INPUT_ID="${{ github.event.inputs.agent_runtime_id }}"
            if [ -n "${INPUT_ID}" ]; then
              echo "agent_runtime_id=${INPUT_ID}" >> $GITHUB_OUTPUT
            else
              echo "agent_runtime_id=projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/${{ vars.REGION }}/reasoningEngines/7483962233899188224" >> $GITHUB_OUTPUT
            fi
          fi

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v3'
        with:
          workload_identity_provider: 'projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ secrets.WIF_POOL_ID }}/providers/${{ secrets.WIF_PROVIDER_ID }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'
          create_credentials_file: true
          project_id: ${{ vars.CICD_PROJECT_ID }}

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v3'
        with:
          install_components: 'beta'

      - name: Deploy Manager Dashboard to Cloud Run
        run: |
          gcloud run deploy expense-manager-dashboard \
            --source . \
            --region ${{ vars.REGION }} \
            --project ${{ steps.set-env.outputs.project_id }} \
            --set-env-vars="GOOGLE_CLOUD_PROJECT=${{ steps.set-env.outputs.project_id }},AGENT_RUNTIME_ID=${{ steps.set-env.outputs.agent_runtime_id }},LOGS_BUCKET_NAME=${{ steps.set-env.outputs.logs_bucket }}" \
            --allow-unauthenticated \
            --memory=1Gi
