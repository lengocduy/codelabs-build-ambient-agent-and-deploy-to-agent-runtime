name: Teardown Infrastructure

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: 'What do you want to clean up?'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - staging_only
          - production_only

jobs:
  teardown:
    name: Teardown Deployed Engines & Infrastructure
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v3'
        with:
          workload_identity_provider: 'projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ secrets.WIF_POOL_ID }}/providers/${{ secrets.WIF_PROVIDER_ID }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'
          create_credentials_file: true
          project_id: ${{ vars.CICD_PROJECT_ID }}

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v3'
        with:
          install_components: 'beta'

      - name: Undeploy Staging Vertex AI Reasoning Engines
        if: github.event.inputs.target_env == 'staging_only' || github.event.inputs.target_env == 'all'
        run: |
          python3 - <<'EOF'
          import urllib.request, urllib.error, json, os
          token = os.popen('gcloud auth print-access-token').read().strip()
          project = '${{ vars.STAGING_PROJECT_ID }}'
          region = '${{ vars.REGION }}'
          url = f"https://{region}-aiplatform.googleapis.com/v1/projects/{project}/locations/{region}/reasoningEngines"
          req = urllib.request.Request(url, headers={"Authorization": f"Bearer {token}"})
          try:
              with urllib.request.urlopen(req) as response:
                  data = json.loads(response.read().decode('utf-8'))
                  for engine in data.get('reasoningEngines', []):
                      name = engine['name']
                      display_name = engine.get('displayName', '')
                      if display_name == 'ambient-expense-agent':
                          print(f"Deleting Staging Reasoning Engine: {name}")
                          del_url = f"https://{region}-aiplatform.googleapis.com/v1/{name}"
                          del_req = urllib.request.Request(del_url, method='DELETE', headers={"Authorization": f"Bearer {token}"})
                          with urllib.request.urlopen(del_req) as del_resp:
                              del_resp.read()
          except urllib.error.HTTPError as e:
              if e.code != 404:
                  print(f"HTTP Error: {e.code} - {e.reason}")
          except Exception as e:
              print(f"Error: {e}")
          EOF

      - name: Undeploy Production Vertex AI Reasoning Engines
        if: github.event.inputs.target_env == 'production_only' || github.event.inputs.target_env == 'all'
        run: |
          python3 - <<'EOF'
          import urllib.request, urllib.error, json, os
          token = os.popen('gcloud auth print-access-token').read().strip()
          project = '${{ vars.PROD_PROJECT_ID }}'
          region = '${{ vars.REGION }}'
          url = f"https://{region}-aiplatform.googleapis.com/v1/projects/{project}/locations/{region}/reasoningEngines"
          req = urllib.request.Request(url, headers={"Authorization": f"Bearer {token}"})
          try:
              with urllib.request.urlopen(req) as response:
                  data = json.loads(response.read().decode('utf-8'))
                  for engine in data.get('reasoningEngines', []):
                      name = engine['name']
                      display_name = engine.get('displayName', '')
                      if display_name == 'ambient-expense-agent':
                          print(f"Deleting Production Reasoning Engine: {name}")
                          del_url = f"https://{region}-aiplatform.googleapis.com/v1/{name}"
                          del_req = urllib.request.Request(del_url, method='DELETE', headers={"Authorization": f"Bearer {token}"})
                          with urllib.request.urlopen(del_req) as del_resp:
                              del_resp.read()
          except urllib.error.HTTPError as e:
              if e.code != 404:
                  print(f"HTTP Error: {e.code} - {e.reason}")
          except Exception as e:
              print(f"Error: {e}")
          EOF

      - name: Setup Terraform
        if: github.event.inputs.target_env == 'all'
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        if: github.event.inputs.target_env == 'all'
        run: |
          cd deployment/terraform/cicd
          terraform init

      - name: Terraform Destroy
        if: github.event.inputs.target_env == 'all'
        run: |
          cd deployment/terraform/cicd
          terraform destroy -var-file=vars/env.tfvars -auto-approve
