name: Teardown Infrastructure

on:
  workflow_dispatch:

jobs:
  teardown:
    name: Teardown Deployed Engines & Infrastructure
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v3'
        with:
          workload_identity_provider: 'projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ secrets.WIF_POOL_ID }}/providers/${{ secrets.WIF_PROVIDER_ID }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'
          create_credentials_file: true
          project_id: ${{ vars.CICD_PROJECT_ID }}

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'
        with:
          install_components: 'beta'

      - name: Undeploy Staging Vertex AI Reasoning Engines
        run: |
          echo "Listing and deleting Staging reasoning engines for ambient-expense-agent..."
          STAGING_ENGINES=$(gcloud beta ai reasoning-engines list \
            --project="${{ vars.STAGING_PROJECT_ID }}" \
            --region="${{ vars.REGION }}" \
            --filter="displayName:ambient-expense-agent" \
            --format="value(name)")
          for ENGINE in $STAGING_ENGINES; do
            echo "Deleting Staging Reasoning Engine: $ENGINE"
            gcloud beta ai reasoning-engines delete "$ENGINE" \
              --project="${{ vars.STAGING_PROJECT_ID }}" \
              --region="${{ vars.REGION }}" \
              --quiet || true
          done

      - name: Undeploy Production Vertex AI Reasoning Engines
        run: |
          echo "Listing and deleting Production reasoning engines for ambient-expense-agent..."
          PROD_ENGINES=$(gcloud beta ai reasoning-engines list \
            --project="${{ vars.PROD_PROJECT_ID }}" \
            --region="${{ vars.REGION }}" \
            --filter="displayName:ambient-expense-agent" \
            --format="value(name)")
          for ENGINE in $PROD_ENGINES; do
            echo "Deleting Production Reasoning Engine: $ENGINE"
            gcloud beta ai reasoning-engines delete "$ENGINE" \
              --project="${{ vars.PROD_PROJECT_ID }}" \
              --region="${{ vars.REGION }}" \
              --quiet || true
          done

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          cd deployment/terraform/cicd
          terraform init

      - name: Terraform Destroy
        run: |
          cd deployment/terraform/cicd
          terraform destroy -var-file=vars/env.tfvars -auto-approve
